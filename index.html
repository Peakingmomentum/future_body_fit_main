<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Future Body Fit - AI Body Transformation & Personalized Workout Plans</title>
    <meta name="description" content="See your future body with AI transformation photos. Get personalized workouts, track nutrition, and achieve your fitness goals. Start free today." />
    <meta name="keywords" content="AI fitness app, body transformation, workout planner, calorie tracker, personalized training, fitness goals, weight loss app, muscle building, nutrition tracker" />
    <meta name="author" content="Future Body Fit" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://futurebodyfit.com/" />

    <!-- Mobile & PWA -->
    <meta name="theme-color" content="#10B981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Future Body Fit" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://futurebodyfit.com/" />
    <meta property="og:title" content="Future Body Fit - See Your Future Body Before You Build It" />
    <meta property="og:description" content="AI-powered fitness transformation. Upload a photo, see your future self, get personalized workouts and nutrition plans." />
    <meta property="og:image" content="https://futurebodyfit.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Future Body Fit" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://futurebodyfit.com/" />
    <meta name="twitter:title" content="Future Body Fit - AI Body Transformation App" />
    <meta name="twitter:description" content="See your future body with AI. Personalized workouts & nutrition tracking." />
    <meta name="twitter:image" content="https://futurebodyfit.com/og-image.png" />

    <!-- Structured Data - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Future Body Fit",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "description": "AI-powered fitness transformation app with personalized workouts and nutrition tracking. See your future body before you build it.",
      "url": "https://futurebodyfit.com",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "5",
        "highPrice": "99",
        "priceCurrency": "USD",
        "offerCount": "3"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1247",
        "bestRating": "5",
        "worstRating": "1"
      },
      "featureList": [
        "AI Body Transformation Photos",
        "Personalized Workout Plans",
        "Nutrition Tracking",
        "Progress Dashboard",
        "Goal Setting"
      ]
    }
    </script>

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Future Body Fit",
      "url": "https://futurebodyfit.com",
      "logo": "https://futurebodyfit.com/favicon.ico",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Future Body Fit",
      "url": "https://futurebodyfit.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://futurebodyfit.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
